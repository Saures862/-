<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь окончен</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
<!-- Контейнер для шкалы здоровья -->
<div
  style="width: 100%; background-color: #555; border-radius: 10px; margin-bottom: 20px;"
>
  <!-- Сама "живая" полоска. id нужен для управления шириной из JS -->
  <div
    id="hpBar"
    style="width: 100%; height: 20px; background-color: #32CD32; border-radius: 10px; transition: width 0.3s; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 20px;"
  >
    100%
  </div>
</div>
        <h1>Путь продолжается</h1>
        <p>Это был неверный выбор. Земля уходит из-под ног, и ты проваливаешься в глубокую яму. К счастью, на дне мягкий
            мох, ты цел, но выбраться отсюда займет несколько дней.</p>
        <div class="choices">
            <a href="cave.html" class="choice">
                <img src="https://avatars.mds.yandex.net/i?id=aad98b1d6e5fcfa3d2cd558d6605005c_l-4602519-images-thumbs&n=13" alt="Меню">
                <span>Открыт новый путь</span>
            </a>
        </div>
    </div>
<!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
<script src="script.js"></script>

<script>
  // Как только игрок попадает на эту страницу, у него отнимается 30 HP
  takeDamage(30);
  // Допишите через alert() сообщение, что он потерял здоровье:
  alert("Это был неверный выбор,отнимается 30 HP!");
</script>

</body>

</html>
