<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сырая пещера</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
<!-- Контейнер для шкалы здоровья -->
<div
  style="width: 100%; background-color: #555; border-radius: 10px; margin-bottom: 20px;"
>
  <!-- Сама "живая" полоска. id нужен для управления шириной из JS -->
  <div
    id="hpBar"
    style="width: 100%; height: 20px; background-color: #32CD32; border-radius: 10px; transition: width 0.3s; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 20px;"
  >
    100%
  </div>
</div>
        <h1>Сырая пещера</h1>
        <p>Ты спускаешься во мрак. Зажигая факел, ты видишь гигантский подземный зал. Путь преграждает глубокая
            пропасть, через которую перекинут хлипкий веревочный мост. На другой стороне спит огромное чешуйчатое
            существо, похожее на дракона.</p>
        <div class="choices">
            <a href="riddle.html" class="choice">
                <img src="https://masterpiecer-images.s3.yandex.net/7f34e1548f8511ee9004429f31467427:upscaled" alt="Тихо идти по мосту">
                <span>Тихо идти по мосту</span>
            </a>
            <a href="dragon.html" class="choice">
                <img src="https://avatars.mds.yandex.net/get-shedevrum/15170052/img_779fef56c2bd11ef943b1ebb82eaae0f/orig" text=Кинуть+камень"
                    alt="Кинуть камень в пропасть">
                <span>Кинуть камень в пропасть</span>
            </a>
        </div>
    </div>
<!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
<script src="script.js"></script>

</body>

</html>
