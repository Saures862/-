<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск Осколка Звезды</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
<!-- Контейнер для шкалы здоровья -->
<div
  style="width: 100%; background-color: #555; border-radius: 10px; margin-bottom: 20px;"
>
  <!-- Сама "живая" полоска. id нужен для управления шириной из JS -->
  <div
    id="hpBar"
    style="width: 100%; height: 20px; background-color: #32CD32; border-radius: 10px; transition: width 0.3s; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 20px;"
  >
    100%
  </div>
</div>
        <h1>Поворот 1 (развитие сюжета)</h1>
        <p>Ты отправился по первому повороту в нем тебя ждали лишь ловушки заготовленные разбойниками но ты с ними справился,и пошел искать комнату с нужными документами.</p>
       <div class="choices">
  <!-- Ссылка на первый (уже готовый) квест -->
  <a href=space_good_ending.html class="choice">
    <img
      src=https://png.pngtree.com/background/20230823/original/pngtree-futuristic-tunnel-corridor-in-the-interior-of-a-spacecraft-or-space-picture-image_4785848.jpg text=Квест+1"
      alt="Пески времени"
    />
    <span>Хорошая концовка</span>
  </a>
</div>

    </div>
<!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
<script src="script.js"></script>

</body>

</html>
