<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Осколок Звезды</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
<!-- Контейнер для шкалы здоровья -->
<div
  style="width: 100%; background-color: #555; border-radius: 10px; margin-bottom: 20px;"
>
  <!-- Сама "живая" полоска. id нужен для управления шириной из JS -->
  <div
    id="hpBar"
    style="width: 100%; height: 20px; background-color: #32CD32; border-radius: 10px; transition: width 0.3s; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 20px;"
  >
    100%
  </div>
</div>
        <h1>Осколок Звезды</h1>
        <p>Ты проходишь последнее испытание. Перед тобой на постаменте парит кристалл, излучающий мягкий золотой свет.
            Ты берешь его в руки, и чувствуешь невероятную энергию. Твое желание исполнится. Ты стал настоящим героем!
        </p>
        <div class="choices">
            <a href="index.html" class="choice">
                <img src="https://avatars.mds.yandex.net/i?id=439b6f80d6c9d2883cd2e2361c849960f3ba4c21460f1060-12641163-images-thumbs&n=13" alt="Меню">
                <span>Вернуться в Главное меню</span>
            </a>
        </div>
    </div>
<!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
<script src="script.js"></script>

<script>
  // Получаем текущее количество побед из памяти. Если значения нет, устанавливаем 0
  // Поскольку localStorage отдает строку, используем parseInt для перевода в число
  let wins = parseInt(localStorage.getItem("questWins")) || 0;

  // Увеличиваем показатель побед на 1
  wins += 1;

  // Перезаписываем обновленное число обратно в localStorage
  localStorage.setItem("questWins", wins);
</script>


</body>

</html>
